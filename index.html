<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Clash</title>
    <style>
        :root {
            --primary: #e74c3c;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--white);
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-top: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 90%;
            max-width: 1000px;
        }

        .card {
            background: #2a2a2a;
            border: 3px solid transparent;
            border-radius: 15px;
            padding: 15px;
            width: 280px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 10px;
            background: #333;
        }

        .vs {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            font-style: italic;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 1.6rem;
            margin-top: 15px;
            font-weight: bold;
        }

        #next-btn {
            margin: 40px 0;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Power Clash</h1>
    <p>Qui est le plus puissant ?</p>

    <div class="container">
        <div class="card" id="char1" onclick="vote(0)">
            <img src="" alt="" id="img1">
            <div class="name" id="name1"></div>
        </div>

        <div class="vs">VS</div>

        <div class="card" id="char2" onclick="vote(1)">
            <img src="" alt="" id="img2">
            <div class="name" id="name2"></div>
        </div>
    </div>

    <button id="next-btn" onclick="loadDuel()">DUEL SUIVANT ⚔️</button>

    <script>
        const characters = [
            { name: "Goku", img: "https://via.placeholder.com/300x400?text=Goku" },
            { name: "Saitama", img: "https://via.placeholder.com/300x400?text=Saitama" },
            { name: "Luffy", img: "https://via.placeholder.com/300x400?text=Luffy" },
            { name: "Sung Jin-Woo", img: "https://via.placeholder.com/300x400?text=Sung+Jin+Woo" },
            { name: "Ichigo Kurosaki", img: "https://via.placeholder.com/300x400?text=Ichigo" },
            { name: "Gon Freecss", img: "https://via.placeholder.com/300x400?text=Gon" },
            { name: "Tanjiro Kamado", img: "https://via.placeholder.com/300x400?text=Tanjiro" },
            { name: "Jotaro Kujo", img: "https://via.placeholder.com/300x400?text=Jotaro" },
            { name: "Aizen Sosuke", img: "https://via.placeholder.com/300x400?text=Aizen" },
            { name: "Sasuke Uchiha", img: "https://via.placeholder.com/300x400?text=Sasuke" },
            { name: "Jin Mori", img: "https://via.placeholder.com/300x400?text=Jin+Mori" },
            { name: "Anti-Spiral", img: "https://via.placeholder.com/300x400?text=Anti-Spiral" },
            { name: "Gojo Satoru", img: "https://via.placeholder.com/300x400?text=Gojo" },
            { name: "Makima", img: "https://via.placeholder.com/300x400?text=Makima" },
            { name: "Deku", img: "https://via.placeholder.com/300x400?text=Deku" },
            { name: "Archie Sonic", img: "https://via.placeholder.com/300x400?text=Archie+Sonic" },
            /* Nouveaux Ajouts */
            { name: "Guts", img: "https://via.placeholder.com/300x400?text=Guts" },
            { name: "Rimuru Tempest", img: "https://via.placeholder.com/300x400?text=Rimuru" },
            { name: "Anos Voldigoad", img: "https://via.placeholder.com/300x400?text=Anos" },
            { name: "Yoriichi", img: "https://via.placeholder.com/300x400?text=Yoriichi" },
            { name: "Gilgamesh", img: "https://via.placeholder.com/300x400?text=Gilgamesh" },
            { name: "Whitebeard", img: "https://via.placeholder.com/300x400?text=Whitebeard" },
            { name: "Madara Uchiha", img: "https://via.placeholder.com/300x400?text=Madara" },
            { name: "Esdeath", img: "https://via.placeholder.com/300x400?text=Esdeath" },
            { name: "Mob (Shigeo)", img: "https://via.placeholder.com/300x400?text=Mob" },
            { name: "Baki Hanma", img: "https://via.placeholder.com/300x400?text=Baki" }
        ];

        function loadDuel() {
            document.getElementById('next-btn').style.display = 'none';
            let i1 = Math.floor(Math.random() * characters.length);
            let i2 = Math.floor(Math.random() * characters.length);
            while (i1 === i2) { i2 = Math.floor(Math.random() * characters.length); }

            document.getElementById('name1').innerText = characters[i1].name;
            document.getElementById('img1').src = characters[i1].img;
            document.getElementById('name2').innerText = characters[i2].name;
            document.getElementById('img2').src = characters[i2].img;

            document.querySelectorAll('.card').forEach(c => {
                c.style.opacity = "1";
                c.style.pointerEvents = "auto";
                c.style.borderColor = "transparent";
            });
        }

        function vote(winnerIndex) {
            const cards = [document.getElementById('char1'), document.getElementById('char2')];
            cards[winnerIndex].style.borderColor = "#2ecc71";
            cards[1 - winnerIndex].style.opacity = "0.3";
            cards.forEach(c => c.style.pointerEvents = "none");
            document.getElementById('next-btn').style.display = 'block';
        }

        window.onload = loadDuel;
    </script>
</body>
</html>
