<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Clash</title>
    <style>
        :root {
            --primary: #e74c3c;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--white);
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-top: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 90%;
            max-width: 1000px;
        }

        .card {
            background: #2a2a2a;
            border: 3px solid transparent;
            border-radius: 15px;
            padding: 15px;
            width: 280px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 10px;
            background: #333;
        }

        .vs {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            font-style: italic;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 1.6rem;
            margin-top: 15px;
            font-weight: bold;
        }

        #next-btn {
            margin: 40px 0;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Power Clash</h1>
    <p>Qui gagne le combat ?</p>

    <div class="container">
        <div class="card" id="char1" onclick="vote(0)">
            <img src="" alt="Perso 1" id="img1">
            <div class="name" id="name1"></div>
        </div>

        <div class="vs">VS</div>

        <div class="card" id="char2" onclick="vote(1)">
            <img src="" alt="Perso 2" id="img2">
            <div class="name" id="name2"></div>
        </div>
    </div>

    <button id="next-btn" onclick="loadDuel()">DUEL SUIVANT ⚔️</button>

    <script>
        const characters = [
            { name: "Goku", img: "https://i.pinimg.com/originals/a3/71/84/a37184284b3f88f01c80f4f9f6e6d19e.jpg" },
            { name: "Saitama", img: "https://i.pinimg.com/originals/73/4d/76/734d76465492d30802c2e0b57223b20e.jpg" },
            { name: "Jin Mori", img: "https://static.wikia.nocookie.net/godofhighschool/images/3/3d/Mori_Jin_Volume_1.png" },
            { name: "Deku", img: "https://i.pinimg.com/originals/25/11/4d/25114d7671754402684725350c3779e2.jpg" },
            { name: "Makima", img: "https://i.pinimg.com/736x/21/2e/8b/212e8b2b78912389d3806a6b8f39589d.jpg" },
            { name: "Archie Sonic", img: "https://static.wikia.nocookie.net/vsbattles/images/0/02/Super_Sonic_Archie.png" },
            { name: "Anti-Spiral", img: "https://static.wikia.nocookie.net/vsbattles/images/8/8d/Anti-Spiral_render.png" },
            { name: "Gojo Satoru", img: "https://i.pinimg.com/originals/a0/0a/73/a00a73d8a98072124504104c9528f804.jpg" }
        ];

        function loadDuel() {
            document.getElementById('next-btn').style.display = 'none';
            
            let i1 = Math.floor(Math.random() * characters.length);
            let i2 = Math.floor(Math.random() * characters.length);

            while (i1 === i2) {
                i2 = Math.floor(Math.random() * characters.length);
            }

            document.getElementById('name1').innerText = characters[i1].name;
            document.getElementById('img1').src = characters[i1].img;
            document.getElementById('name2').innerText = characters[i2].name;
            document.getElementById('img2').src = characters[i2].img;

            document.querySelectorAll('.card').forEach(c => {
                c.style.opacity = "1";
                c.style.pointerEvents = "auto";
                c.style.borderColor = "transparent";
            });
        }

        function vote(winnerIndex) {
            const cards = [document.getElementById('char1'), document.getElementById('char2')];
            cards[winnerIndex].style.borderColor = "#2ecc71";
            cards[1 - winnerIndex].style.opacity = "0.3";
            cards.forEach(c => c.style.pointerEvents = "none");
            document.getElementById('next-btn').style.display = 'block';
        }

        window.onload = loadDuel;
    </script>
</body>
</html>
